# ============================================
# TMUX CONFIGURATION
# ============================================

# ============================================
# GENERAL SETTINGS
# ============================================
set-option -g prefix C-a
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g default-terminal "screen-256color"
set -sa terminal-features ',xterm-256color:RGB'
set -g focus-events on

set -g history-limit 60000
set -g status-interval 5
set -s escape-time 0

setw -g xterm-keys on
setw -g mode-keys vi
setw -g aggressive-resize on

set -g mouse on

# ============================================
# CUSTOM MODE INDICATORS
# ============================================
set-option -g @commandMode ' 👽  ║ '
set-option -g @insertMode ' 🚀  ║ '

# ============================================
# WINDOW MANAGEMENT
# ============================================

# Split windows
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind-key \\ split-window -fh -c "#{pane_current_path}"
bind-key _ split-window -fv -c "#{pane_current_path}"

# Create window in current directory
bind c new-window -c "#{pane_current_path}"

# Navigate windows
bind -r P swap-window -t -1
bind -r N swap-window -t +1

# Rename window
bind R command-prompt 'rename-window %%'

# Reload config
unbind r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Send prefix to nested tmux
bind a send-prefix

# ============================================
# PANE NAVIGATION (vim-tmux-navigator)
# ============================================
# NOTE: vim-tmux-navigator sets up C-hjkl automatically
# These are fallback bindings for when navigator isn't loaded

# Smart pane switching with awareness of vim splits
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"

bind -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind -T copy-mode-vi 'C-h' select-pane -L
bind -T copy-mode-vi 'C-j' select-pane -D
bind -T copy-mode-vi 'C-k' select-pane -U
bind -T copy-mode-vi 'C-l' select-pane -R
bind -T copy-mode-vi 'C-\' select-pane -l

# Pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Zoom/unzoom pane
bind z resize-pane -Z

# Break pane to new window
bind b break-pane -d

# ============================================
# COPY MODE (VI STYLE)
# ============================================
bind [ copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi [ send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi ] send -X copy-selection
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

# ============================================
# SESSION MANAGEMENT
# ============================================

# Quick session switcher
bind S choose-tree -Zs

# Create new session
bind C-c new-session -d -s '' \; switch-client -t '=:'

# ============================================
# USEFUL BINDINGS
# ============================================

# Clear history
bind -n C-K clear-history

# Synchronize panes (for parallel commands)
bind C-s setw synchronize-panes

# Join pane (move pane to another window)
bind -r G choose-tree -w "join-pane -h -t '%%'"
bind -r O choose-tree -w "join-pane -v -t '%%'"

# Popup (floating window)
bind -r F display-popup

# ============================================
# PANE APPEARANCE
# ============================================
set -g pane-border-style 'fg=#44475a'
set -g pane-active-border-style 'fg=#bd93f9,bg=default'

# ============================================
# STATUS BAR
# ============================================
set-option -g status-position top
set -g status-bg "#1f1d2e"
set -g status-fg "#e0def4"

# ============================================
# PLUGINS
# ============================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'rose-pine/tmux'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'xamut/tmux-weather'

# Productivity
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-pain-control'

# Session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# ============================================
# PLUGIN CONFIGURATION
# ============================================

# Resurrect
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# Continuum
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ============================================
# ROSÉ PINE THEME
# ============================================
set -g @rose_pine_variant 'main'
set -g @rose_pine_date_time '%Y-%m-%d %H:%M'

# ============================================
# STATUS BAR
# ============================================
set -g status-right "#{battery_icon} #{battery_percentage} | #{weather} | %a %H:%M"
set -g status-left "#[fg=#1f1d2e,bg=#e0def4]#{?client_prefix,#[bg=#e0def4],}  🚀  #[fg=#e0def4,bg=#1f1d2e]"

# ============================================
# INITIALIZE TPM
# ============================================
run '~/.tmux/plugins/tpm/tpm'

# ============================================
# PLUGIN RUN-SHELL (after TPM)
# ============================================
run-shell ~/.tmux/plugins/tmux-battery/battery.tmux
run-shell ~/.tmux/plugins/tmux-weather/tmux-weather.tmux
